<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos Numéricos - Miguel Iván Carrillo Ventura</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            text-align: center;
            padding: 50px 20px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            width: 100%;
            border-bottom: 1px solid #334155;
        }
        h1 { color: #38bdf8; margin: 0; font-size: 2.5rem; }
        h2 { color: #94a3b8; font-weight: 300; }
        .container { max-width: 1000px; width: 90%; margin: 30px 0; }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .math-box {
            background: #0f172a;
            padding: 15px;
            border-left: 4px solid #38bdf8;
            font-family: 'Courier New', Courier, monospace;
            margin: 10px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            font-size: 0.9rem;
        }
        th { background: #334155; color: #38bdf8; text-align: left; padding: 12px; }
        td { border-bottom: 1px solid #334155; padding: 12px; }
        #plot { width: 100%; height: 500px; border-radius: 8px; overflow: hidden; }
        .btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background: #7dd3fc; }
    </style>
</head>
<body>

<header>
    <h1>Método de Euler & Euler Mejorado</h1>
    <h2>Presentado por: Miguel Iván Carrillo Ventura</h2>
    <div class="math-box">
        EDO: dy/dx = x² / 4y <br>
        Condiciones: y(0) = 1 | h = 0.2 | x<sub>f</sub> = 1
    </div>
</header>

<div class="container">
    <div class="card">
        <h3>📊 Visualización Dinámica</h3>
        <div id="plot"></div>
        <div style="margin-top: 15px; text-align: center;">
            <button class="btn" onclick="animateCalculation()">▶️ Simular Paso a Paso</button>
        </div>
    </div>

    <div class="card">
        <h3>📝 Tabla de Resultados (Iteraciones)</h3>
        <div id="table-container">
            <table id="resultsTable">
                <thead>
                    <tr>
                        <th>Paso (n)</th>
                        <th>x<sub>n</sub></th>
                        <th>Euler Simple (y<sub>n</sub>)</th>
                        <th>Euler Mejorado (y<sub>n</sub>)</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const f = (x, y) => (x**2) / (4 * y);
    const h = 0.2;
    const x0 = 0, y0 = 1, xf = 1;

    function calculate() {
        let data = { euler: [[x0, y0]], heun: [[x0, y0]] };
        
        // Euler Simple
        let curX = x0, curY = y0;
        while(curX < xf + 0.01) {
            let nextY = curY + h * f(curX, curY);
            curX += h;
            curY = nextY;
            data.euler.push([curX, curY]);
        }

        // Euler Mejorado
        curX = x0; curY = y0;
        while(curX < xf + 0.01) {
            let k1 = f(curX, curY);
            let yPredictor = curY + h * k1;
            let k2 = f(curX + h, yPredictor);
            let nextY = curY + (h/2) * (k1 + k2);
            curX += h;
            curY = nextY;
            data.heun.push([curX, curY]);
        }
        return data;
    }

    const results = calculate();

    function initPlot() {
        const trace1 = {
            x: [x0], y: [y0],
            mode: 'lines+markers',
            name: 'Euler Simple',
            line: {color: '#f87171'}
        };
        const trace2 = {
            x: [x0], y: [y0],
            mode: 'lines+markers',
            name: 'Euler Mejorado',
            line: {color: '#38bdf8'}
        };

        const layout = {
            paper_bgcolor: '#1e293b',
            plot_bgcolor: '#1e293b',
            font: {color: '#f8fafc'},
            xaxis: {title: 'Eje X', gridcolor: '#334155'},
            yaxis: {title: 'Eje Y', gridcolor: '#334155'},
            margin: {t: 20}
        };

        Plotly.newPlot('plot', [trace1, trace2], layout);
    }

    async function animateCalculation() {
        const tbody = document.querySelector('#resultsTable tbody');
        tbody.innerHTML = '';
        initPlot();

        for (let i = 0; i < results.euler.length; i++) {
            await new Promise(r => setTimeout(r, 600)); // Delay para efecto visual
            
            // Actualizar Tabla
            let row = tbody.insertRow();
            row.innerHTML = `<td>${i}</td>
                             <td>${results.euler[i][0].toFixed(1)}</td>
                             <td>${results.euler[i][1].toFixed(5)}</td>
                             <td>${results.heun[i][1].toFixed(5)}</td>`;
            
            // Actualizar Gráfica
            Plotly.extendTraces('plot', {
                x: [[results.euler[i][0]], [results.heun[i][0]]],
                y: [[results.euler[i][1]], [results.heun[i][1]]]
            }, [0, 1]);
        }
    }

    window.onload = initPlot;
</script>

</body>
</html>
