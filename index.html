<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos Numéricos - Miguel Iván Carrillo Ventura</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; }
        .header { text-align: center; border-bottom: 2px solid #38bdf8; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { color: #38bdf8; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 15px; }
        #log { height: 400px; overflow-y: auto; font-size: 0.85rem; line-height: 1.4; border-left: 3px solid #f1e05a; padding-left: 10px; }
        .step-block { margin-bottom: 20px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .math { color: #79c0ff; }
        .highlight { color: #ffa657; }
        .btn { background: #238636; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 10px; }
        #plot { height: 400px; }
        @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1>Análisis Numérico: Euler vs Euler Mejorado</h1>
    <p>Autor: <strong>Miguel Iván Carrillo Ventura</strong></p>
    <p>Ecuación: <em>dy/dx = x² / 4y</em> | h = 0.2</p>
</div>

<div class="grid">
    <div class="card">
        <h3>📈 Gráfica Comparativa</h3>
        <div id="plot"></div>
        <button class="btn" onclick="startSimulation()">▶️ Generar Procedimiento Paso a Paso</button>
    </div>

    <div class="card">
        <h3>📝 Memoria de Cálculo (Automática)</h3>
        <div id="log">Haz clic en el botón para iniciar la solución...</div>
    </div>
</div>

<script>
    const f = (x, y) => (x**2) / (4 * y);
    const h = 0.2;
    let x0 = 0, y0 = 1, xf = 1;

    function initPlot() {
        Plotly.newPlot('plot', [
            { x: [0], y: [1], name: 'Euler Simple', mode: 'lines+markers', line: {color: '#f87171'} },
            { x: [0], y: [1], name: 'Euler Mejorado', mode: 'lines+markers', line: {color: '#38bdf8'} }
        ], {
            paper_bgcolor: '#161b22', plot_bgcolor: '#161b22',
            font: {color: '#c9d1d9'}, margin: {t:10},
            xaxis: {gridcolor: '#30363d'}, yaxis: {gridcolor: '#30363d'}
        });
    }

    async function startSimulation() {
        const log = document.getElementById('log');
        log.innerHTML = "";
        initPlot();

        let xe = 0, ye = 1; // Euler simple
        let xm = 0, ym = 1; // Euler mejorado

        for (let i = 1; i <= 5; i++) {
            await new Promise(r => setTimeout(r, 1500)); // Pausa para lectura
            
            // --- CÁLCULO EULER SIMPLE ---
            let slopeE = f(xe, ye);
            let ye_next = ye + h * slopeE;
            let x_next = xe + h;

            // --- CÁLCULO EULER MEJORADO ---
            let k1 = f(xm, ym);
            let y_pred = ym + h * k1;
            let k2 = f(xm + h, y_pred);
            let ym_next = ym + (h/2) * (k1 + k2);

            // Escribir procedimiento en el LOG
            let stepDiv = document.createElement('div');
            stepDiv.className = 'step-block';
            stepDiv.innerHTML = `
                <b style="color:#f1e05a">ITERACIÓN ${i} (x = ${x_next.toFixed(1)}):</b><br>
                <span class="math">EULER SIMPLE:</span><br>
                y<sub>next</sub> = ${ye.toFixed(4)} + (0.2)(${slopeE.toFixed(4)}) = <b class="highlight">${ye_next.toFixed(5)}</b><br><br>
                <span class="math">EULER MEJORADO:</span><br>
                1. k1 = f(${xm.toFixed(1)}, ${ym.toFixed(4)}) = ${k1.toFixed(4)}<br>
                2. Predictor (y*): ${ym.toFixed(4)} + (0.2)(${k1.toFixed(4)}) = ${y_pred.toFixed(4)}<br>
                3. k2 = f(${x_next.toFixed(1)}, ${y_pred.toFixed(4)}) = ${k2.toFixed(4)}<br>
                4. y<sub>corr</sub> = ${ym.toFixed(4)} + (0.1)(${k1.toFixed(4)} + ${k2.toFixed(4)}) = <b class="highlight">${ym_next.toFixed(5)}</b>
            `;
            log.appendChild(stepDiv);
            log.scrollTop = log.scrollHeight;

            // Actualizar Gráfica
            Plotly.extendTraces('plot', { 
                x: [[x_next], [x_next]], 
                y: [[ye_next], [ym_next]] 
            }, [0, 1]);

            xe = x_next; ye = ye_next;
            xm = x_next; ym = ym_next;
        }
        
        log.innerHTML += `<br><h3 style="color:#238636">✅ Simulación Completada</h3>`;
    }

    window.onload = initPlot;
</script>
</body>
</html>
